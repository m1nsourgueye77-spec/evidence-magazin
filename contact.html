<!DOCTYPE html>
<html>
    <head>
        <meta charset='UTF-8'>
        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Contactez l'équipe d'Evidence Magazin.">
        <title>Contact</title>
        <link rel='stylesheet' href='css/style.css'>
    
    </head>
    <body>
        
    

<main>

<h2>Nous contacter</h2>

<p>
Une question ? Une proposition d'article ?
N'hésitez pas à nous écrire.
</p>

<!-- formulaire ici -->
<form>

<label for="nom">Nom</label>
<input
type="text"
id="nom"
name="nom"
placeholder="Votre nom"
required>

<label for="email">Email</label>
<input
type="email"
id="email"
name="email"
placeholder="Votre adresse e-mail"
required>

<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="6"
placeholder="Votre message..."
required></textarea>

<button type="submit">
Envoyer
</button>

</form>
</main>



        <br>
    
        <footer>
    © <span id="year"></span> Evidence Magazin - Tous droits réservés.
</footer>


<script src='js/script.js'></script>

    </body>
    </html>
